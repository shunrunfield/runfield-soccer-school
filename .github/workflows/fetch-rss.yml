name: せっかく掲示板 RSS取得

on:
  schedule:
    # 毎日 17:10 JST (= 08:10 UTC) に実行
    - cron: '10 8 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: RSS取得・JSON変換
        run: python3 scripts/fetch_rss.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/announcements.json
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "お知らせ自動更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
            git push
          )
