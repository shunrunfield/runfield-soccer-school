name: せっかく掲示板 RSS取得

on:
  schedule:
    # JST  8:30 (= UTC 23:30 前日) ※低負荷帯
    - cron: '30 23 * * *'
    # JST 11:30 (= UTC 02:30) ※低負荷帯
    - cron: '30 2 * * *'
    # JST 13:40 (= UTC 04:40) ※低負荷帯
    - cron: '40 4 * * *'
    # JST 14:40 (= UTC 05:40) ※低負荷帯
    - cron: '40 5 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: RSS取得・JSON変換
        run: python3 scripts/fetch_rss.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/announcements.json
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "お知らせ自動更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
            git push
          )
